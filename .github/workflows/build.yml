
name: Build

on: [push, pull_request]

jobs:
  linux-core:
    runs-on: ubuntu-16.04
    name: ${{ matrix.image }}-abi:${{ matrix.abi }}-${{ matrix.compiler }}-${{ matrix.build }}-blosc:${{ matrix.blosc }}-simd:${{ matrix.simd }}
    container:
      image: aswf/ci-openvdb:${{ matrix.image }}
    strategy:
      matrix:
        image: ['2018', '2019', '2020']
        abi: [4, 5, 6, 7]
        compiler: ['g++', 'clang++']
        build: ['Release', 'Debug']
        blosc: ['OFF', 'ON']
        simd: ['None', 'SSE42']
    steps:
      - uses: actions/checkout@v1
      - name: build
        run: |
          ./ci/build.sh \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
            -DOPENVDB_ABI_VERSION_NUMBER=${{ matrix.abi }} \
            -DUSE_BLOSC=${{ matrix.blosc }} \
            -DOPENVDB_SIMD=${{ matrix.simd }} \
            -DOPENVDB_CXX_STRICT=ON
      - name: test
        run: ./ci/test.sh

  linux-houdini:
    runs-on: ubuntu-16.04
    name: ${{ matrix.image }}-houdini:${{ matrix.houdini }}-abi:${{ matrix.abi }}-${{ matrix.compiler }}-${{ matrix.build }}
    container:
      image: aswf/ci-openvdb:${{ matrix.image }}
    strategy:
      matrix:
        image: ['2018', '2019', '2020']
        compiler: ['g++', 'clang++']
        build: ['Release', 'Debug']
        include:
          - image: '2018'
            houdini: 17.0
          - image: '2019'
            houdini: 17.5
          - image: '2020'
            houdini: 18.0
    steps:
      - uses: actions/checkout@v1
      - name: houdini
        run: ./ci/install_houdini.sh ${{ matrix.houdini }} ${{ secrets.HOUPASS }}
      - name: build
        run: ./ci/build_houdini.sh ${{ matrix.compiler }} ${{ matrix.build }} -DUSE_BLOSC=ON -DOPENVDB_SIMD=None -DOPENVDB_CXX_STRICT=ON
      - name: test
        run: ./ci/test.sh

  testwindows2019:
    runs-on: windows-2019
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
    - uses: actions/checkout@v2
    - name: path
      run: |
        # note: system path must be modified in a previous step to it's use
        echo "::add-path::%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\bin"
        echo "::add-path::${{github.workspace}}\build\openvdb\Release"
    - name: update_vcpkg
      shell: bash
      run: |
        # temporarily update vcpkg to fix tbb port
        cd C:\vcpkg
        git fetch
        git checkout 97302ca1729eac9917c8a8977667601453795c90
        bootstrap-vcpkg.bat
    - name: install
      shell: bash
      run: ./ci/install_windows.sh
    - name: build
      shell: bash
      run: ./ci/build_windows.sh "${VCPKG_INSTALLATION_ROOT}"
    - name: test
      shell: bash
      run: ./ci/test.sh

  testmacos1015:
    runs-on: macos-10.15
    steps:
    - uses: actions/checkout@v2
    - name: install
      shell: bash
      run: ./ci/install_macos.sh
    - name: build
      shell: bash
      # brew boost-python installs a "Keg-only" version of python which is
      # not insatlled to PATH. Until this becomes the default, we must
      # manually provide the location of the require python installation
      # See https://formulae.brew.sh/formula/python@3.8
      # Also need to disable compiler warnings for ABI 6 and above due to
      # the version of clang installed
      run: ./ci/build.sh clang++ Release 7 ON SSE42 -DPython_ROOT_DIR=/usr/local/opt/python@3.8 -DOPENVDB_CXX_STRICT=OFF
    - name: test
      shell: bash
      run: ./ci/test.sh
